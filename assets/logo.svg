<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="1000" height="200">
    <defs>
        <style>
            .bg { fill: #000000; }
            .brand-name {
                font-family: 'Didot', 'Bodoni MT', 'Cinzel', 'Garamond', 'Optima', serif;
                font-size: 64px;
                font-weight: 300;
                fill: #FFFFFF;
                letter-spacing: 18px;
                text-anchor: middle;
            }
            .brand-sub {
                font-family: 'Montserrat', 'Helvetica Neue', 'Arial', sans-serif;
                font-size: 14px;
                font-weight: 300;
                fill: #A3A3A3;
                letter-spacing: 10px;
                text-anchor: middle;
                text-transform: uppercase;
            }
        </style>
    </defs>
    <rect width="1000" height="200" class="bg" />
    <text x="509" y="105" class="brand-name">NOREVA</text>
    <text x="505" y="145" class="brand-sub">Luxury Fashion House</text>
</svg>
