<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Noreva</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header>
      <div class="logo">NOREVA</div>

      <nav>
        <a href="#">Home</a>
        <a href="#">Women</a>
        <a href="#">Men</a>
        <a href="#">Fragrance</a>
      </nav>

      <div class="cart-btn">
        <a href="cart.html">
          Cart (
          <span id="cartCount"> 0 </span>
          )
        </a>
      </div>
    </header>

    <section class="hero">
      <div class="hero-content">
        <p class="small-text">Luxury Fashion House</p>

        <h1>Timeless Elegance.</h1>

        <p>Curated fashion, fragrances and essentials.</p>

        <a href="shop.html">
          <button>Shop Collection</button>
        </a>
      </div>
    </section>

    <section class="categories">
      <h2>Collections</h2>

      <div class="category-grid">
        <div class="category-card">Women's Fashion</div>

        <div class="category-card">Men's Fashion</div>

        <div class="category-card">Fragrance</div>
      </div>
    </section>

    <section class="products">
      <h2>Featured Products</h2>

      <div id="productGrid"></div>
    </section>

    <footer>
      <p>© 2026 NOREVA</p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/common.js"></script>
  </body>
</html>
